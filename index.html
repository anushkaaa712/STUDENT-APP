<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Student Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #f0a500;
    --accent2: #e05c2a;
    --text: #e8edf5;
    --text-muted: #6b7a99;
    --green: #22c97a;
    --red: #e05c5c;
    --blue: #3b82f6;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(240,165,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,165,0,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 0 24px; }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 36px;
    animation: slideDown 0.6s ease;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo-icon {
    width: 46px; height: 46px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 20px rgba(240,165,0,0.3);
  }
  .logo-text h1 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent), #fff 70%);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .logo-text p { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

  .server-status {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--text-muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 8px 16px; border-radius: 30px;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text-muted);
    transition: background 0.3s;
  }
  .status-dot.online { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .status-dot.offline { background: var(--red); }

  /* Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 32px;
    animation: fadeUp 0.6s ease 0.1s both;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 24px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }
  .stat-card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: linear-gradient(180deg, var(--accent), var(--accent2));
  }
  .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
  .stat-value {
    font-family: 'Playfair Display', serif;
    font-size: 38px;
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
    margin: 6px 0 4px;
  }
  .stat-sub { font-size: 12px; color: var(--text-muted); }

  /* Toolbar */
  .toolbar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    animation: fadeUp 0.6s ease 0.2s both;
    flex-wrap: wrap;
  }
  .search-box {
    flex: 1; min-width: 200px;
    position: relative;
  }
  .search-box input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 16px 11px 42px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box::before {
    content: '🔍';
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    pointer-events: none;
  }
  select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  select:focus { border-color: var(--accent); }

  .btn {
    padding: 11px 22px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    box-shadow: 0 4px 15px rgba(240,165,0,0.25);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(240,165,0,0.4); }
  .btn-sm { padding: 7px 14px; font-size: 12px; border-radius: 8px; }
  .btn-danger { background: rgba(224,92,92,0.15); color: var(--red); border: 1px solid rgba(224,92,92,0.3); }
  .btn-danger:hover { background: rgba(224,92,92,0.25); }
  .btn-edit { background: rgba(59,130,246,0.15); color: var(--blue); border: 1px solid rgba(59,130,246,0.3); }
  .btn-edit:hover { background: rgba(59,130,246,0.25); }

  /* Table */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    animation: fadeUp 0.6s ease 0.3s both;
  }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--surface2); }
  th {
    padding: 14px 20px;
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-muted);
    font-weight: 600;
  }
  td {
    padding: 16px 20px;
    font-size: 14px;
    border-top: 1px solid var(--border);
    vertical-align: middle;
  }
  tr { transition: background 0.15s; }
  tbody tr:hover { background: rgba(240,165,0,0.03); }

  .student-name { font-weight: 600; color: var(--text); }
  .student-email { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .grade-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .grade-A { background: rgba(34,201,122,0.15); color: var(--green); border: 1px solid rgba(34,201,122,0.3); }
  .grade-B { background: rgba(59,130,246,0.15); color: var(--blue); border: 1px solid rgba(59,130,246,0.3); }
  .grade-C { background: rgba(240,165,0,0.15); color: var(--accent); border: 1px solid rgba(240,165,0,0.3); }
  .grade-N { background: rgba(107,122,153,0.15); color: var(--text-muted); border: 1px solid rgba(107,122,153,0.3); }

  .actions { display: flex; gap: 8px; }

  .empty-state {
    padding: 60px 20px;
    text-align: center;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 16px; }
  .empty-state span { font-size: 13px; display: block; margin-top: 6px; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    width: 100%;
    max-width: 480px;
    transform: translateY(20px) scale(0.97);
    transition: transform 0.25s;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    margin-bottom: 24px;
    color: var(--text);
  }
  .modal-title span { color: var(--accent); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .form-group input, .form-group select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
  .form-group input::placeholder { color: var(--text-muted); }

  .modal-actions { display: flex; gap: 12px; margin-top: 8px; justify-content: flex-end; }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 11px 22px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-ghost:hover { border-color: var(--text-muted); color: var(--text); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px; right: 28px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px;
    font-size: 14px;
    color: var(--text);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    z-index: 200;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
    display: flex; align-items: center; gap: 10px;
    max-width: 300px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: rgba(34,201,122,0.4); }
  .toast.error { border-color: rgba(224,92,92,0.4); }

  /* Error banner */
  .error-banner {
    background: rgba(224,92,92,0.1);
    border: 1px solid rgba(224,92,92,0.3);
    border-radius: 12px;
    padding: 14px 20px;
    margin-bottom: 20px;
    font-size: 14px;
    color: var(--red);
    display: none;
    align-items: center; gap: 10px;
  }
  .error-banner.show { display: flex; }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 768px) {
    .stats-grid { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
    th:nth-child(4), td:nth-child(4) { display: none; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">🎓</div>
      <div class="logo-text">
        <h1>AcademiQ</h1>
        <p>Student Management System</p>
      </div>
    </div>
    <div class="server-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>
  </header>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total Students</div>
      <div class="stat-value" id="statTotal">—</div>
      <div class="stat-sub">enrolled learners</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Courses</div>
      <div class="stat-value" id="statCourses">—</div>
      <div class="stat-sub">active programs</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Average GPA</div>
      <div class="stat-value" id="statGpa">—</div>
      <div class="stat-sub">out of 4.0</div>
    </div>
  </div>

  <div class="error-banner" id="errorBanner">
    ⚠️ <span id="errorMsg">Cannot connect to backend. Make sure the server is running on port 3001.</span>
  </div>

  <div class="toolbar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search students by name or email..." oninput="filterStudents()"/>
    </div>
    <select id="courseFilter" onchange="filterStudents()">
      <option value="">All Courses</option>
    </select>
    <button class="btn btn-primary" onclick="openModal()">+ Add Student</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Student</th>
          <th>Course</th>
          <th>Grade</th>
          <th>Age</th>
          <th>Enrolled</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="studentTable">
        <tr><td colspan="6">
          <div class="empty-state"><div class="icon">⏳</div><p>Loading students...</p></div>
        </td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeOnOutside(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Add <span>New Student</span></div>
    <div class="form-row">
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" id="fName" placeholder="e.g. Aarav Sharma"/>
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" id="fEmail" placeholder="student@email.com"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Course *</label>
        <select id="fCourse">
          <option value="">Select course</option>
          <option>Computer Science</option>
          <option>Mathematics</option>
          <option>Physics</option>
          <option>Chemistry</option>
          <option>Biology</option>
          <option>Engineering</option>
          <option>Economics</option>
          <option>Literature</option>
        </select>
      </div>
      <div class="form-group">
        <label>Grade</label>
        <select id="fGrade">
          <option value="N/A">N/A</option>
          <option>A</option>
          <option>A-</option>
          <option>B+</option>
          <option>B</option>
          <option>B-</option>
          <option>C</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Age</label>
      <input type="number" id="fAge" placeholder="18" min="16" max="60"/>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveStudent()">Save Student</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const API = 'http://localhost:3001/api';
  let allStudents = [];
  let editingId = null;

  async function checkServer() {
    try {
      const r = await fetch(`${API}/stats`);
      if (r.ok) {
        document.getElementById('statusDot').className = 'status-dot online';
        document.getElementById('statusText').textContent = 'Server Online';
        document.getElementById('errorBanner').classList.remove('show');
        return true;
      }
    } catch {
      document.getElementById('statusDot').className = 'status-dot offline';
      document.getElementById('statusText').textContent = 'Server Offline';
      document.getElementById('errorBanner').classList.add('show');
      return false;
    }
  }

  async function loadStats() {
    try {
      const r = await fetch(`${API}/stats`);
      const { data } = await r.json();
      document.getElementById('statTotal').textContent = data.totalStudents;
      document.getElementById('statCourses').textContent = data.totalCourses;
      document.getElementById('statGpa').textContent = data.averageGPA;
      const cf = document.getElementById('courseFilter');
      const current = cf.value;
      cf.innerHTML = '<option value="">All Courses</option>';
      data.courses.forEach(c => {
        const o = document.createElement('option');
        o.value = c; o.textContent = c;
        if (c === current) o.selected = true;
        cf.appendChild(o);
      });
    } catch {}
  }

  async function loadStudents() {
    try {
      const r = await fetch(`${API}/students`);
      const { data } = await r.json();
      allStudents = data;
      renderTable(data);
    } catch {
      document.getElementById('studentTable').innerHTML = `
        <tr><td colspan="6">
          <div class="empty-state">
            <div class="icon">🔌</div>
            <p>Backend not reachable</p>
            <span>Start the server: <code>node server.js</code></span>
          </div>
        </td></tr>`;
    }
  }

  function gradeClass(g) {
    if (!g || g === 'N/A') return 'grade-N';
    if (g.startsWith('A')) return 'grade-A';
    if (g.startsWith('B')) return 'grade-B';
    return 'grade-C';
  }

  function renderTable(students) {
    const tbody = document.getElementById('studentTable');
    if (!students.length) {
      tbody.innerHTML = `
        <tr><td colspan="6">
          <div class="empty-state">
            <div class="icon">🎓</div>
            <p>No students found</p>
            <span>Add your first student using the button above</span>
          </div>
        </td></tr>`;
      return;
    }
    tbody.innerHTML = students.map(s => `
      <tr>
        <td>
          <div class="student-name">${s.name}</div>
          <div class="student-email">${s.email}</div>
        </td>
        <td>${s.course}</td>
        <td><span class="grade-badge ${gradeClass(s.grade)}">${s.grade}</span></td>
        <td>${s.age}</td>
        <td>${s.enrolled}</td>
        <td>
          <div class="actions">
            <button class="btn btn-sm btn-edit" onclick="editStudent('${s.id}')">Edit</button>
            <button class="btn btn-sm btn-danger" onclick="deleteStudent('${s.id}')">Delete</button>
          </div>
        </td>
      </tr>`).join('');
  }

  function filterStudents() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const course = document.getElementById('courseFilter').value;
    const filtered = allStudents.filter(s => {
      const matchSearch = !q || s.name.toLowerCase().includes(q) || s.email.toLowerCase().includes(q);
      const matchCourse = !course || s.course === course;
      return matchSearch && matchCourse;
    });
    renderTable(filtered);
  }

  function openModal(student = null) {
    editingId = student ? student.id : null;
    document.getElementById('modalTitle').innerHTML = student
      ? 'Edit <span>Student</span>'
      : 'Add <span>New Student</span>';
    document.getElementById('fName').value = student?.name || '';
    document.getElementById('fEmail').value = student?.email || '';
    document.getElementById('fCourse').value = student?.course || '';
    document.getElementById('fGrade').value = student?.grade || 'N/A';
    document.getElementById('fAge').value = student?.age || '';
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    editingId = null;
  }

  function closeOnOutside(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  async function saveStudent() {
    const payload = {
      name: document.getElementById('fName').value.trim(),
      email: document.getElementById('fEmail').value.trim(),
      course: document.getElementById('fCourse').value,
      grade: document.getElementById('fGrade').value,
      age: document.getElementById('fAge').value,
    };
    if (!payload.name || !payload.email || !payload.course) {
      showToast('⚠️ Please fill in all required fields', 'error'); return;
    }
    try {
      const url = editingId ? `${API}/students/${editingId}` : `${API}/students`;
      const method = editingId ? 'PUT' : 'POST';
      const r = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await r.json();
      if (!r.ok) { showToast('❌ ' + data.message, 'error'); return; }
      showToast(editingId ? '✏️ Student updated!' : '✅ Student added!', 'success');
      closeModal();
      await loadStudents();
      await loadStats();
    } catch {
      showToast('❌ Cannot connect to server', 'error');
    }
  }

  async function editStudent(id) {
    const student = allStudents.find(s => s.id === id);
    if (student) openModal(student);
  }

  async function deleteStudent(id) {
    if (!confirm('Delete this student? This cannot be undone.')) return;
    try {
      const r = await fetch(`${API}/students/${id}`, { method: 'DELETE' });
      const data = await r.json();
      if (!r.ok) { showToast('❌ ' + data.message, 'error'); return; }
      showToast('🗑️ Student deleted', 'success');
      await loadStudents();
      await loadStats();
    } catch {
      showToast('❌ Cannot connect to server', 'error');
    }
  }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3200);
  }

  async function init() {
    await checkServer();
    await loadStats();
    await loadStudents();
    setInterval(checkServer, 10000);
  }

  init();
</script>
</body>
</html>
